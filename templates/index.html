<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Wars - Agent Dashboard</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            width: 100%;
        }

        .nav-content {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            gap: 3rem;
            box-sizing: border-box;
        }

        .navbar h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            display: flex;
            flex: 1;
            padding: 2rem;
            gap: 2rem;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
            min-height: 0;
            overflow: hidden;
        }

        .sidebar {
            width: 320px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(16px);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 0;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        .sidebar::-webkit-scrollbar {
            display: none;
        }

        .main-content {
            flex: 1;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            backdrop-filter: blur(16px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            min-height: 0;
        }

        .leaderboard {
            width: 380px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(16px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            max-height: 100%;
            align-self: stretch;
            min-height: 0;
        }

        .lb-scroll-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            -ms-overflow-style: none;
            scrollbar-width: none;
            padding-right: 5px; /* Slight padding so items don't hit the very edge */
            margin-top: 0.5rem;
        }
        
        .lb-scroll-container::-webkit-scrollbar {
            display: none;
        }

        .lb-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .lb-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 8px;
            font-size: 0.9rem;
            border-left: 3px solid transparent;
        }
        
        .lb-row.rank-1 { border-left-color: #fbbf24; }
        .lb-row.rank-2 { border-left-color: #94a3b8; }
        .lb-row.rank-3 { border-left-color: #b45309; }

        .lb-rank {
            font-weight: bold;
            width: 24px;
            color: var(--text-muted);
        }

        .lb-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 10px;
        }

        .lb-score {
            font-weight: bold;
            color: var(--accent);
            text-align: right;
        }
        
        .lb-matches {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
            text-align: right;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group-horizontal {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .form-group-horizontal label {
            margin: 0;
            white-space: nowrap;
        }

        .form-group-horizontal select, .form-group-horizontal input {
            flex: 1;
            width: 100%;
            padding: 0.6rem;
            font-size: 0.95rem;
        }

        #p1 { border-left: 4px solid #0072B2; }
        #p2 { border-left: 4px solid #D55E00; }
        #p3 { border-left: 4px solid #009E73; }
        #p4 { border-left: 4px solid #F0E442; }

        label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        select, input {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.85rem;
            border-radius: 8px;
            font-size: 1.05rem;
            outline: none;
            transition: all 0.2s;
        }

        select:focus, input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        select option {
            background-color: #1e293b;
            color: #f8fafc;
            font-size: 1.1rem;
            padding: 0.8rem;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: auto;
        }

        .btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
        }

        #iframe-container {
            flex: 1;
            width: 100%;
            height: 100%;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            font-size: 1.1rem;
            flex-direction: column;
            gap: 1rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .player-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        /* Wong Palette */
        .c0 { background: #0072B2; }
        .c1 { background: #D55E00; }
        .c2 { background: #009E73; }
        .c3 { background: #F0E442; }

    </style>
</head>
<body>

    <div class="navbar">
        <div class="nav-content">
            <h1>Orbit Wars Dashboard</h1>
            <div style="display: flex; gap: 1.5rem; align-items: center; margin-top: 5px;">
                <a href="/" style="color: var(--accent); text-decoration: none; font-weight: bold; font-size: 1.05rem;">Simulator</a>
                <a href="/analytics" style="color: var(--text-muted); text-decoration: none; font-size: 1.05rem; transition: color 0.2s;" onmouseover="this.style.color='#f8fafc'" onmouseout="this.style.color='var(--text-muted)'">Analytics</a>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="sidebar">
            <div class="form-group-horizontal">
                <label>Match Mode</label>
                <select id="mode" onchange="togglePlayers()">
                    <option value="1v1">1 vs 1 (Duel)</option>
                    <option value="ffa" selected>4-Player (FFA)</option>
                </select>
            </div>

            <div class="form-group-horizontal" style="margin-top: 0.5rem;">
                <label>Seed</label>
                <input type="number" id="seed" placeholder="Random">
            </div>

            <hr style="border-color: var(--border-color); width: 100%; margin: 1rem 0;">

            <div class="form-group">
                <select id="p1">
                    {% for val, name in models.items() %}
                    <option value="{{val}}" {% if loop.index0 == 0 %}selected{% endif %}>{{name}}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <select id="p2">
                    {% for val, name in models.items() %}
                    <option value="{{val}}" {% if loop.index0 == 1 %}selected{% endif %}>{{name}}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group p34">
                <select id="p3">
                    {% for val, name in models.items() %}
                    <option value="{{val}}" {% if loop.index0 == 2 %}selected{% endif %}>{{name}}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group p34">
                <select id="p4">
                    {% for val, name in models.items() %}
                    <option value="{{val}}" {% if loop.index0 == 3 %}selected{% endif %}>{{name}}</option>
                    {% endfor %}
                </select>
            </div>

            <div id="left-bottom-wrapper" style="margin-top: auto; display: flex; flex-direction: column; width: 100%;">
                <button id="runBtn" class="btn" style="width: 100%; margin-top: 0;" onclick="runSimulation()">Run Simulation</button>
            </div>
        </div>

        <div class="main-content">
            <div id="placeholder" class="placeholder">
                <div id="spinner" class="spinner"></div>
                <span id="status-text">Select agents and click Run Simulation</span>
            </div>
            <iframe id="iframe" style="display: none;"></iframe>
        </div>

        <!-- Leaderboard Sidebar -->
        {% if leaderboard %}
        <div class="leaderboard">
            <div>
                <div class="lb-title">Global Elo Leaderboard</div>
                <div style="font-size: 0.8rem; color: var(--text-muted); text-align: center; margin-top: -10px; margin-bottom: 5px;">Total Matches: {{total_matches}}</div>
            </div>
            
            <div class="lb-scroll-container">
                {% for player in leaderboard %}
                <div class="lb-row rank-{{player.rank}}">
                    <div class="lb-rank">#{{player.rank}}</div>
                    <div class="lb-name" title="{{player.name}}">{{player.name}}</div>
                    <div>
                        <div class="lb-score">{{player.elo}}</div>
                        <div class="lb-matches">{{player.matches}} matches</div>
                    </div>
                </div>
                {% endfor %}
            </div>
            
            <div style="margin-top: 1rem; display: flex; flex-direction: column; width: 100%;">
                <button class="btn" id="restart-tournament-btn" style="width: 100%; background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.5); color: #fca5a5; margin-top: 0;" onclick="restartTournament()">
                    <i class="fas fa-sync-alt" style="margin-right: 8px;"></i> Restart Tournament
                </button>
            </div>
        </div>
        {% endif %}
    </div>

    <script>
        function togglePlayers() {
            const mode = document.getElementById('mode').value;
            const extras = document.querySelectorAll('.p34');
            extras.forEach(el => el.style.display = (mode === 'ffa') ? 'flex' : 'none');
        }

        async function runSimulation() {
            const btn = document.getElementById('runBtn');
            const placeholder = document.getElementById('placeholder');
            const spinner = document.getElementById('spinner');
            const statusText = document.getElementById('status-text');
            const iframe = document.getElementById('iframe');

            btn.disabled = true;
            iframe.style.display = 'none';
            placeholder.style.display = 'flex';
            spinner.style.display = 'block';
            statusText.textContent = "Simulating match... this may take a few seconds.";

            const payload = {
                mode: document.getElementById('mode').value,
                seed: document.getElementById('seed').value,
                p1: document.getElementById('p1').value,
                p2: document.getElementById('p2').value,
                p3: document.getElementById('p3').value,
                p4: document.getElementById('p4').value
            };

            try {
                const res = await fetch('/run', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                
                if (data.success) {
                    iframe.src = data.replay_url;
                    iframe.style.display = 'block';
                    placeholder.style.display = 'none';
                    
                    // Show final scores
                    let scoreHtml = "<div style='margin-top: 15px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px;'>";
                    scoreHtml += "<h3 style='margin:0 0 10px 0; font-size: 14px;'>Match Results:</h3>";
                    data.scores.forEach(s => {
                        scoreHtml += `<div style='font-size: 13px; margin-bottom: 5px;'>${s}</div>`;
                    });
                    if (data.seed) {
                        scoreHtml += `<div style='font-size: 13px; margin-top: 10px; color: var(--accent);'>Seed: ${data.seed}</div>`;
                    }
                    scoreHtml += "</div>";
                    
                    let scoreDiv = document.getElementById('final-scores');
                    if (!scoreDiv) {
                        scoreDiv = document.createElement('div');
                        scoreDiv.id = 'final-scores';
                        scoreDiv.style.marginBottom = '10px';
                        document.getElementById('left-bottom-wrapper').insertBefore(scoreDiv, document.getElementById('runBtn'));
                    }
                    scoreDiv.innerHTML = scoreHtml;
                    
                } else {
                    alert("Error running simulation: " + data.error);
                    statusText.textContent = "Failed to run simulation.";
                    spinner.style.display = 'none';
                }
            } catch (err) {
                alert("Network error: " + err);
                statusText.textContent = "Failed to connect to server.";
                spinner.style.display = 'none';
            }

            btn.disabled = false;
        }


        async function restartTournament() {
            if(!confirm('Are you sure you want to restart the tournament? Elo ratings will reset to 1200, but previous match history is safely preserved.')) return;
            
            try {
                const response = await fetch('/api/restart_tournament', { method: 'POST' });
                const result = await response.json();
                if (result.success) {
                    window.location.reload();
                } else {
                    alert('Error restarting tournament: ' + result.error);
                }
            } catch (err) {
                alert('Request failed: ' + err);
            }
        }
    </script>
</body>
</html>
